kind = "web"
previewPath = "/"
title = "ALESLAM Book Store"
version = "1.0.0"
id = "artifacts/aleslam-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21390

[services.development]
run = "pnpm --filter @workspace/aleslam-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aleslam-store", "run", "build" ]
publicDir = "artifacts/aleslam-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21390"
BASE_PATH = "/"
